<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TimeTrace</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="container">
    <div class="brand">TimeTrace</div>

    <div class="stat-card " id="today-card">
      <span>Today</span>
      <strong id="screen-time">0m</strong>
    </div>

    <div class="focus-card">
      <span>Focus Score</span>
      <div id="popup-score" class="score">
        --
      </div>
      <p id="popup-message" class="message">
        Loading...
      </p>
    </div>

    <div class="breakdown">

    <div class="chip productive">
      <span>🟢 Productive</span>
      <strong id="productive-time">0m</strong>
    </div>

    <div class="chip distracting">
      <span>🔴 Distracting</span>
      <strong id="distracting-time">0m</strong>
    </div>
    <div class="chip neutral">
      <span>🟡 Neutral</span>
      <strong id="neutral-time">0m</strong>
    </div>


  </div>

  <div class="top-sites-card">
    <h3>Top Websites</h3>
    <div id="top-sites"></div>
  </div>

  <div class="button-row">
    <button id="open-dashboard" >
      Open Dashboard
    </button>
  </div>

</div>
<script src="shared.js"></script>
<script src="popup.js"></script>
  </body>
</html>
